{% extends 'base.html' %}
{% block title %}Access · VITALII.SYS{% endblock %}

{% block extra_css %}
<style>
    .auth-wrap {
        min-height: calc(100vh - 70px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
    }
    .auth-container {
        width: 100%;
        max-width: 420px;
        padding: 44px;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(0,229,255,0.18);
        border-radius: 20px;
        backdrop-filter: blur(24px);
        box-shadow: 0 0 40px rgba(0,229,255,0.06);
    }
    .auth-title {
        font-family: 'Orbitron', monospace;
        font-size: 1.6rem;
        font-weight: 900;
        margin-bottom: 8px;
        text-align: center;
        background: linear-gradient(90deg, var(--cyan), var(--purple));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }
    .auth-sub {
        text-align: center;
        font-size: 0.85rem;
        color: rgba(255,255,255,0.4);
        margin-bottom: 36px;
        font-family: 'JetBrains Mono', monospace;
        letter-spacing: 0.1em;
    }
    .form-group { margin-bottom: 20px; }
    .form-group label {
        display: block;
        font-family: 'Orbitron', monospace;
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 0.2em;
        color: var(--cyan);
        margin-bottom: 8px;
    }
    .form-group input {
        width: 100%;
        background: rgba(0,229,255,0.04);
        border: 1px solid rgba(0,229,255,0.2);
        border-radius: 10px;
        padding: 14px 16px;
        color: #fff;
        outline: none;
        font-family: 'Exo 2', sans-serif;
        font-size: 0.95rem;
        transition: 0.3s;
    }
    .form-group input:focus {
        border-color: var(--cyan);
        box-shadow: 0 0 16px var(--cyan-glow);
    }
    .btn-auth {
        width: 100%;
        padding: 15px;
        background: transparent;
        border: 1px solid var(--pink);
        color: var(--pink);
        border-radius: 12px;
        font-family: 'Orbitron', monospace;
        font-weight: 700;
        font-size: 0.82rem;
        letter-spacing: 0.1em;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 10px;
        box-shadow: 0 0 12px var(--pink-glow);
    }
    .btn-auth:hover {
        background: rgba(255,45,120,0.12);
        box-shadow: 0 0 28px var(--pink), 0 0 50px var(--pink-glow);
        color: #fff;
    }
    .auth-link {
        text-align: center;
        margin-top: 24px;
        font-size: 0.88rem;
        color: rgba(255,255,255,0.45);
    }
    .auth-link a {
        color: var(--purple);
        text-decoration: none;
        font-weight: 700;
        text-shadow: 0 0 8px var(--purple-glow);
    }
    .auth-link a:hover { color: var(--cyan); }
    .errorlist {
        color: var(--pink);
        font-size: 0.8rem;
        list-style: none;
        padding: 0;
        margin-top: 6px;
        font-family: 'JetBrains Mono', monospace;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-container">
        <div class="auth-title">WELCOME BACK</div>
        <div class="auth-sub">// IDENTITY_VERIFICATION</div>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>USERNAME</label>
                <input type="text" name="username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label>PASSWORD</label>
                <input type="password" name="password" required autocomplete="current-password">
            </div>
            {% if form.errors %}
            <ul class="errorlist"><li>Invalid credentials. Try again.</li></ul>
            {% endif %}
            <button type="submit" class="btn-auth">▸ ACCESS SYSTEM</button>
        </form>
        <div class="auth-link">
            No account? <a href="{% url 'signup' %}">Register</a>
        </div>
    </div>
</div>
{% endblock %}
