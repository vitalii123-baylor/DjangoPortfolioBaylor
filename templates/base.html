<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}VITALII · Security & Dev{% endblock %}</title>
    {% load static %}

    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/9374/9374944.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg:        #07020f;
            --bg2:       #0d0520;
            --pink:      #ff2d78;
            --pink-glow: rgba(255, 45, 120, 0.55);
            --cyan:      #00e5ff;
            --cyan-glow: rgba(0, 229, 255, 0.45);
            --purple:    #b44fff;
            --purple-glow: rgba(180, 79, 255, 0.5);
            --orange:    #ff8c00;
            --glass:     rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.12);
            /* legacy aliases for older pages */
            --n-purple:  #b44fff;
            --n-blue:    #00e5ff;
            --n-cyan:    #00e5ff;
            --glass-bright: rgba(255, 255, 255, 0.07);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            background-image:
                /* horizon glow */
                radial-gradient(ellipse 120% 40% at 50% 100%, rgba(255,45,120,0.18) 0%, transparent 60%),
                /* top purple */
                radial-gradient(ellipse 80% 50% at 50% 0%, rgba(180,79,255,0.15) 0%, transparent 55%),
                /* perspective grid */
                linear-gradient(rgba(0,229,255,0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,229,255,0.07) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 60px 60px, 60px 60px;
            font-family: 'Exo 2', sans-serif;
            color: #fff;
            min-height: 100vh;
            overflow-x: clip;
        }

        /* NAVBAR */
        .navbar {
            background: rgba(7, 2, 15, 0.85);
            backdrop-filter: blur(24px);
            padding: 18px 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(0,229,255,0.2);
            box-shadow: 0 2px 30px rgba(0,229,255,0.08);
        }

        .nav-brand {
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: 1.25rem;
            text-decoration: none;
            color: #fff;
            letter-spacing: 0.05em;
        }
        .nav-brand span {
            color: var(--cyan);
            text-shadow: 0 0 12px var(--cyan), 0 0 30px var(--cyan-glow);
        }

        .nav-links { display: flex; gap: 32px; align-items: center; }
        .nav-links a {
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-family: 'Orbitron', monospace;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            transition: 0.3s;
        }
        .nav-links a:hover {
            color: var(--cyan);
            text-shadow: 0 0 10px var(--cyan);
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 10px; box-shadow: 0 0 8px var(--purple-glow); }
        * { scrollbar-width: thin; scrollbar-color: var(--purple) var(--bg); }

        /* CARDS */
        .card, .info-card, .bento-card, .project-card {
            background: var(--glass) !important;
            border: 1px solid rgba(0,229,255,0.15) !important;
            backdrop-filter: blur(20px) !important;
            border-radius: 16px !important;
            transition: 0.35s cubic-bezier(0.2,1,0.3,1) !important;
        }
        .card:hover, .info-card:hover {
            border-color: var(--cyan) !important;
            box-shadow: 0 0 24px var(--cyan-glow), inset 0 0 20px rgba(0,229,255,0.04) !important;
            transform: translateY(-4px);
        }

        /* NEON BUTTON */
        .btn-neon {
            font-family: 'Orbitron', monospace;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: var(--cyan);
            background: transparent;
            border: 1px solid var(--cyan);
            padding: 12px 28px;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s;
            box-shadow: 0 0 10px var(--cyan-glow);
        }
        .btn-neon:hover {
            background: rgba(0,229,255,0.1);
            box-shadow: 0 0 24px var(--cyan), 0 0 48px var(--cyan-glow);
            color: #fff;
        }

        .btn-pink {
            font-family: 'Orbitron', monospace;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: var(--pink);
            background: transparent;
            border: 1px solid var(--pink);
            padding: 12px 28px;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s;
            box-shadow: 0 0 10px var(--pink-glow);
        }
        .btn-pink:hover {
            background: rgba(255,45,120,0.1);
            box-shadow: 0 0 24px var(--pink), 0 0 48px var(--pink-glow);
            color: #fff;
        }

        /* LABEL */
        .label {
            font-family: 'Orbitron', monospace;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.3em;
            text-transform: uppercase;
        }

        /* SCANLINES — global */
        body::after {
            content: '';
            position: fixed; inset: 0; z-index: 50;
            pointer-events: none;
            background: repeating-linear-gradient(
                to bottom,
                transparent 0px, transparent 3px,
                rgba(0,0,0,0.15) 3px, rgba(0,0,0,0.15) 4px
            );
        }

        /* PARTICLES */
        .particle {
            position: fixed;
            width: 2px; height: 2px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: particle-drift linear infinite;
            opacity: 0;
        }
        @keyframes particle-drift {
            0%   { transform: translateY(100vh); opacity: 0; }
            10%  { opacity: 0.7; }
            90%  { opacity: 0.5; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }

        /* FLICKER */
        @keyframes neon-flicker {
            0%,19%,21%,23%,25%,54%,56%,100% { opacity: 1; }
            20%,22%,24%,55% { opacity: 0.4; }
        }

        /* RESPONSIVE — navbar */
        @media (max-width: 768px) {
            .navbar { padding: 12px 20px; }
            .nav-links { gap: 14px; }
        }
        @media (max-width: 480px) {
            .navbar { padding: 10px 16px; }
            .nav-brand { font-size: 1rem; }
            .nav-links { gap: 8px; }
            .nav-links a { font-size: 0.6rem; letter-spacing: 0.06em; }
            .nav-linkedin-label { display: none; }
        }

        /* CUSTOM CURSOR */
        @media (pointer: fine) {
            *, *::before, *::after { cursor: none !important; }

            #cur-dot {
                position: fixed; top: 0; left: 0; z-index: 99999;
                width: 6px; height: 6px;
                background: var(--cyan);
                border-radius: 50%;
                box-shadow: 0 0 8px var(--cyan), 0 0 16px var(--cyan-glow);
                pointer-events: none;
                transform: translate(-50%, -50%);
                transition: background 0.15s, box-shadow 0.15s, transform 0.08s;
                will-change: transform;
            }

            #cur-ring {
                position: fixed; top: 0; left: 0; z-index: 99998;
                width: 32px; height: 32px;
                border: 1px solid rgba(0,229,255,0.6);
                border-radius: 50%;
                pointer-events: none;
                transform: translate(-50%, -50%);
                box-shadow: 0 0 8px var(--cyan-glow), inset 0 0 6px rgba(0,229,255,0.05);
                transition: width 0.2s, height 0.2s, border-color 0.2s, box-shadow 0.2s;
                will-change: transform;
            }

            /* crosshair lines */
            #cur-ring::before, #cur-ring::after {
                content: '';
                position: absolute;
                background: rgba(0,229,255,0.35);
            }
            #cur-ring::before {
                width: 1px; height: 8px;
                left: 50%; top: -12px;
                transform: translateX(-50%);
            }
            #cur-ring::after {
                width: 8px; height: 1px;
                top: 50%; left: -12px;
                transform: translateY(-50%);
            }

            /* hover state — pink target lock */
            body.cur-hover #cur-dot {
                background: var(--pink);
                box-shadow: 0 0 10px var(--pink), 0 0 20px var(--pink-glow);
                transform: translate(-50%, -50%) scale(1.5);
            }
            body.cur-hover #cur-ring {
                width: 40px; height: 40px;
                border-color: rgba(255, 45, 120, 0.7);
                box-shadow: 0 0 12px var(--pink-glow), inset 0 0 8px rgba(255,45,120,0.05);
            }

            /* click pulse */
            body.cur-click #cur-ring {
                width: 48px; height: 48px;
                border-color: var(--cyan);
                opacity: 0.4;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-brand"><span>VITALII</span>.SYS</a>
        <div class="nav-links">
            <a href="{% url 'projects' %}">Projects</a>
            <a href="/api/expenses/dashboard/">Fin_Tracker</a>
            <a href="/api/sentiment/dashboard/">Analysis</a>
            <a href="https://www.linkedin.com/in/vkandabarov/" target="_blank" rel="noopener" class="nav-linkedin" style="display:flex; align-items:center; gap:6px; color:var(--cyan); border:1px solid rgba(0,229,255,0.3); padding:7px 14px; border-radius:8px; box-shadow:0 0 8px var(--cyan-glow);">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                <span class="nav-linkedin-label">LinkedIn</span>
            </a>
        </div>
    </nav>
    {% block content %}{% endblock %}
    {% block extra_js %}{% endblock %}

    <div id="cur-dot" style="opacity:0"></div>
    <div id="cur-ring" style="opacity:0"></div>

    <script>
        /* Custom cursor — only on pointer-fine devices */
        (function() {
            if (window.matchMedia('(pointer: fine)').matches) {
                const dot  = document.getElementById('cur-dot');
                const ring = document.getElementById('cur-ring');
                let rx = 0, ry = 0, mx = 0, my = 0;

                document.addEventListener('mousemove', e => {
                    mx = e.clientX; my = e.clientY;
                    dot.style.left = mx + 'px';
                    dot.style.top  = my + 'px';
                    if (dot.style.opacity === '0') {
                        rx = mx; ry = my;
                        dot.style.opacity = '1';
                        ring.style.opacity = '1';
                    }
                });

                /* ring follows with smooth lag */
                (function loop() {
                    rx += (mx - rx) * 0.12;
                    ry += (my - ry) * 0.12;
                    ring.style.left = rx + 'px';
                    ring.style.top  = ry + 'px';
                    requestAnimationFrame(loop);
                })();

                /* hover state on clickable elements */
                const clickables = 'a, button, input, textarea, select, label, [onclick], [role="button"]';
                document.addEventListener('mouseover', e => {
                    if (e.target.closest(clickables)) document.body.classList.add('cur-hover');
                });
                document.addEventListener('mouseout', e => {
                    if (e.target.closest(clickables)) document.body.classList.remove('cur-hover');
                });

                /* click pulse */
                document.addEventListener('mousedown', () => {
                    document.body.classList.add('cur-click');
                    setTimeout(() => document.body.classList.remove('cur-click'), 200);
                });
            }
        })();

        /* Global particles — all pages */
        const _colors = ['#00e5ff','#ff2d78','#b44fff','#ff8c00'];
        for (let i = 0; i < 24; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.cssText = `
                left:${Math.random()*100}vw;
                background:${_colors[Math.floor(Math.random()*_colors.length)]};
                box-shadow:0 0 6px currentColor;
                animation-duration:${9+Math.random()*14}s;
                animation-delay:${Math.random()*12}s;
                width:${Math.random()>0.6?'3px':'2px'};
                height:${Math.random()>0.6?'3px':'2px'};
            `;
            document.body.appendChild(p);
        }
    </script>
</body>
</html>
